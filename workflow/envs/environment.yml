### Environment file for the microbiome metagenomic analysis workflow ###

name: MAW

channels:
  - conda-forge
  - bioconda
  - defaults # For MAGpy module

dependencies:
  - snakemake>=6.6.1
  - biopython
  - python>=3.7
  - pandas
  - git
  - wget
  - unzip
  - mamba # For MAGpy module

# Sequence preprocessing
  - minimap2
  - samtools
  - metabat2
  - fastp
  - flye

# Taxonomy assignment
  - cat
  - kraken2
  - blast>=2.1
  - phylophlan

# Creating reports and figures
  - multiqc==1.10.1
  - recentrifuge
  - numpy
  - matplotlib
  - graphviz
  - biom-format
  - kraken-biom # creates BIOM from kraken output
  - csvtk
  - seqkit

# Packages for analysis in R
  - r-base==3.6.3
  - r-tidyverse
  - r-dplyr
  - r-vegan
  - r-tibble
  - r-rcolorbrewer
  - r-ggplot2
  - r-gdata
  - r-ggrepel
  - r-ggfortify
  - r-stringi
  - r-gplots
